services:
  migrate:
    build: .
    container_name: dumpectorist-migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: >-
        postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-app}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  backend-api:
    build: .
    container_name: dumpectorist-api
    env_file:
      - .env
    environment:
      DATABASE_URL: >-
        postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-app}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_BIND:-127.0.0.1:8787}:8787"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.main"]
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8787/api/v1/health', timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  runtime-worker:
    build: .
    container_name: dumpectorist-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: >-
        postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-app}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.worker"]
    stop_grace_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: dumpectorist-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_BIND:-127.0.0.1:5432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dumpectorist-redis
    ports:
      - "${REDIS_BIND:-127.0.0.1:6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
