services:
  backend-api:
    build: .
    container_name: cavack-backend-api
    env_file:
      - .env
    ports:
      - "8787:8787"
    depends_on:
      - postgres
      - redis
    command: ["python", "-m", "app.main"]

  postgres:
    image: postgres:16-alpine
    container_name: cavack-postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: cavack-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
