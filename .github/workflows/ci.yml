name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile application
        run: python -m compileall -q app

      - name: Validate Compose
        run: |
          cp .env.example .env
          docker compose config --quiet

      - name: Run Ruff
        shell: bash
        run: |
          set -o pipefail
          ruff check . 2>&1 | tee pytest.log

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          pytest -q --tb=short 2>&1 | tee pytest.log

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest.log
          if-no-files-found: error
          retention-days: 7
