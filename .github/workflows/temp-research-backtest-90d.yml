name: Temporary Research Backtest 90D

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  backtest:
    if: startsWith(github.head_ref, 'research/backtest-90d-final-')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Select last 90 complete archive days
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('research/backtest_90d.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'START=datetime(2026,4,22,tzinfo=UTC); END=datetime(2026,7,21,tzinfo=UTC)',
              'START=datetime(2026,4,21,tzinfo=UTC); END=datetime(2026,7,20,tzinfo=UTC)',
          )
          text = text.replace('probe_stamp="2026-07-20"', 'probe_stamp="2026-07-19"')
          text = text.replace('no_2026-07-20_archive', 'no_2026-07-19_archive')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Compile research runner
        run: python -m compileall -q research

      - name: Execute frozen 90-day backtest
        shell: bash
        run: |
          set -o pipefail
          python research/backtest_90d.py 2>&1 | tee research-backtest.log

      - name: Validate result
        run: |
          test -s research_backtest_result.json
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('research_backtest_result.json').read_text())
          assert data['run']['primary_source'] == 'data.binance.vision USD-M futures archives'
          assert data['run']['period_start'] == '2026-04-21T00:00:00+00:00'
          assert data['run']['period_end_exclusive'] == '2026-07-20T00:00:00+00:00'
          assert data['metrics']['capital_start'] == 100.0
          assert data['universe'], data['symbol_diagnostics']
          print(json.dumps(data['metrics'], indent=2, sort_keys=True))
          PY

      - name: Upload research evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-backtest-90d
          path: |
            research_backtest_result.json
            research-backtest.log
          if-no-files-found: warn
          retention-days: 14
